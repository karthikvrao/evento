name: Deploy to Google Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  # Deploy web app to Firebase Hosting
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web App
        run: pnpm --filter web build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          entryPoint: apps/web

  # Deploy agent service to Cloud Run
  deploy-agent-service:
    name: Deploy Agent Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy evento-agent-service \
            --source apps/agent_service \
            --project $PROJECT_ID \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars "RUNTIME_ENV=production,\
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},\
            GOOGLE_CLOUD_LOCATION=$REGION,\
            GOOGLE_GENAI_USE_VERTEXAI=TRUE,\
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},\
            FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},\
            AGENT_ENGINE_ID=${{ secrets.AGENT_ENGINE_ID }}"
